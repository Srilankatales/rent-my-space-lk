  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --white:#FFFFFF; --cream:#F8F5F0; --warm:#EDEAE4; --border:#DDD9D2;
      --ink:#1A1A18; --ink-2:#3D3B38; --muted:#9A958E;
      --sage:#4A7C6F; --sage-l:#6B9E91; --sage-d:#2E5049;
      --terra:#B85C38;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--ink); overflow-x: hidden; -webkit-font-smoothing: antialiased; cursor: none; }
    a, button { cursor: none; }

    /* CURSOR */
    .cursor { width: 10px; height: 10px; background: var(--white); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width 0.25s, height 0.25s; border: 2px solid var(--sage); mix-blend-mode: difference; }
    .cursor.expand { width: 52px; height: 52px; background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.6); }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 72px; padding: 0 48px; display: flex; align-items: center; justify-content: space-between; background: rgba(248,245,240,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 500; color: var(--ink); text-decoration: none; }
    .nav-logo em { font-style: italic; color: var(--sage); }
    .nav-back { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-2); text-decoration: none; border: 1px solid var(--border); padding: 9px 20px; border-radius: 2px; transition: all 0.2s; }
    .nav-back:hover { background: var(--ink); color: var(--white); border-color: var(--ink); }

    /* PAGE HEADER */
    .page-header { padding: 120px 48px 60px; max-width: 1200px; margin: 0 auto; }
    .sec-label { display: flex; align-items: center; gap: 12px; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }
    .sec-label::after { content: ''; width: 36px; height: 1px; background: var(--border); }
    .sec-num { font-family: 'Cormorant Garamond', serif; font-size: 0.85rem; color: var(--border); }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.8rem, 5vw, 5rem); font-weight: 300; color: var(--ink); letter-spacing: -0.02em; line-height: 1.05; }
    .page-title em { font-style: italic; color: var(--sage); }
    .page-sub { font-size: 0.9rem; font-weight: 300; color: var(--muted); line-height: 1.7; max-width: 420px; margin-top: 18px; }

    .cities-grid-full { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
    .city-card { position: relative; overflow: hidden; height: 280px; text-decoration: none; display: block; }
    .city-card.large { height: 420px; }
    .city-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform 0.65s cubic-bezier(0.25,0.46,0.45,0.94); }
    .city-card:hover .city-bg { transform: scale(1.07); }
    .city-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(20,20,18,0.75) 0%, rgba(20,20,18,0.1) 55%, transparent 100%); transition: background 0.3s; }
    .city-card:hover .city-overlay { background: linear-gradient(to top, rgba(20,20,18,0.85) 0%, rgba(20,20,18,0.2) 55%, transparent 100%); }
    .city-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 26px; }
    .city-name { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400; color: var(--white); line-height: 1; margin-bottom: 5px; }
    .city-card.large .city-name { font-size: 2.8rem; }

    .city-count { display: inline-block; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 12px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.85); border-radius: 2px; transition: background 0.2s; }
    .city-card:hover .city-count { background: var(--sage); border-color: var(--sage); color: var(--white); }
    .city-no-img { background: var(--ink); }

    .lp-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; color: var(--ink); }

    .lp-close { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-2); background: transparent; border: 1px solid var(--border); padding: 8px 18px; border-radius: 2px; transition: all 0.2s; }

    .sc-ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--muted); }
    .sc-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(20,20,18,0.78) 0%, rgba(20,20,18,0.08) 55%, transparent); }

    .sc-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 26px; z-index: 2; }
    .sc-type { font-size: 0.58rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 5px; }
    .sc-name { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; color: var(--white); line-height: 1.2; margin-bottom: 4px; }
    .sc-loc { font-size: 0.7rem; color: rgba(255,255,255,0.5); font-weight: 300; margin-bottom: 16px; }
    .sc-footer { display: flex; align-items: center; justify-content: space-between; }
    .sc-price { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; color: var(--white); }
    .sc-price small { font-family: 'Jost', sans-serif; font-size: 0.58rem; color: rgba(255,255,255,0.45); }
    .sc-btn { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white); border: 1px solid rgba(255,255,255,0.35); padding: 8px 16px; background: transparent; transition: all 0.3s; transform: translateY(8px); opacity: 0; }
    .space-card:hover .sc-btn { transform: translateY(0); opacity: 1; }
    .sc-btn:hover { background: var(--white); color: var(--ink); }
    .no-msg { grid-column:1/-1; padding: 80px 20px; text-align: center; }
    .no-msg h3 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; color: var(--ink-2); margin-bottom: 10px; }
    .no-msg p { font-size: 0.85rem; color: var(--muted); }
    .skel { background: linear-gradient(90deg, var(--warm) 25%, var(--border) 50%, var(--warm) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; aspect-ratio: 3/4; }

    .m-close { position: absolute; top: 18px; right: 18px; z-index: 10; width: 34px; height: 34px; background: rgba(255,255,255,0.9); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 700; transition: background 0.2s; }

    .m-body { padding: 28px 32px 36px; }

      .spaces-grid { grid-template-columns: 1fr; }

    }
  </style>
</head>

  { name:'Ampara',       province:'Eastern Province',        img:'https://images.unsplash.com/photo-1505459668311-8dfac7952bf0?w=600&auto=format&fit=crop&q=80' },
  { name:'Moratuwa',     province:'Western Province',        img:'https://images.unsplash.com/photo-1494522855154-9297ac14b55f?w=600&auto=format&fit=crop&q=80' },
  { name:'Kalutara',     province:'Western Province',        img:'https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=600&auto=format&fit=crop&q=80' },
];

// ── LOAD ALL SPACES ──
async function init() {
  try {
    const snap = await db.collection('spaces').where('active','==',true).get();
    snap.forEach(d => allSpaces.push({id:d.id,...d.data()}));
  } catch(e) {}
  renderCities();
}

// ── RENDER CITY GRID ──
function renderCities() {
  const grid = document.getElementById('citiesGrid');
  grid.innerHTML = CITIES.map(c => {
    const count = allSpaces.filter(s => s.city && s.city.toLowerCase() === c.name.toLowerCase()).length;
    const countLabel = count === 0 ? 'No spaces yet' : count === 1 ? '1 space' : `${count} spaces`;
    return `<a class="city-card${c.large?' large':''}" href="#" onclick="openCity('${c.name}');return false;">
      <div class="city-bg" style="background-image:url('${c.img}')"></div>
      <div class="city-overlay"></div>
      <div class="city-info">
        <div class="city-name">${c.name}</div>
        <div class="city-prov">${c.province}</div>
        <div class="city-count">${countLabel}</div>
      </div>
    </a>`;
  }).join('');

  // Cursor expand on cards
  document.querySelectorAll('.city-card').forEach(el => {
    el.addEventListener('mouseenter', () => cur.classList.add('expand'));
    el.addEventListener('mouseleave', () => cur.classList.remove('expand'));
  });
}

// ── OPEN CITY ──
function openCity(cityName) {
  const page = document.getElementById('listingsPage');
  page.style.display = 'block';
  page.scrollTop = 0;
  document.body.style.overflow = 'hidden';

  document.getElementById('lpCityName').textContent = cityName;
  document.getElementById('lpCityHeading').innerHTML = `Spaces in <em style="font-style:italic;color:var(--sage)">${cityName}</em>`;

  const filtered = allSpaces.filter(s => s.city && s.city.toLowerCase() === cityName.toLowerCase());
  document.getElementById('lpCount').textContent = filtered.length === 0 ? 'No spaces listed yet' : `${filtered.length} space${filtered.length > 1 ? 's' : ''} available`;

  renderCitySpaces(filtered);
  history.pushState({city: cityName}, '', `?city=${encodeURIComponent(cityName)}`);
}

function closeCity() {
  document.getElementById('listingsPage').style.display = 'none';
  document.body.style.overflow = '';
  history.pushState({}, '', window.location.pathname);
}

// ── RENDER SPACES IN CITY ──
function renderCitySpaces(list) {
  const grid = document.getElementById('lpGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="no-msg"><h3>No spaces listed yet</h3><p>Check back soon — more spaces are being added regularly.</p></div>';
    return;
  }
  grid.style.gridTemplateColumns = list.length === 1 ? 'repeat(3,1fr)' : list.length === 2 ? 'repeat(2,1fr)' : 'repeat(3,1fr)';
  grid.innerHTML = list.map(s => {
    const img = s.images && s.images[0] ? s.images[0] : null;
    const tagClass = s.badge === 'New' ? 'tag-terra' : 'tag-sage';
    return `<div class="space-card" onclick="openModal('${s.id}')">
      ${img ? `<div class="sc-img" style="background-image:url('${img}')"></div>` : '<div class="sc-ph">🏠</div>'}
      <div class="sc-overlay"></div>
      ${s.badge ? `<div class="sc-tag ${tagClass}">${s.badge}</div>` : ''}
      <div class="sc-body">
        <div class="sc-type">${s.type||'Space'}</div>
        <div class="sc-name">${s.name}</div>
        <div class="sc-loc">📍 ${s.city}${s.location?', '+s.location:''}</div>
        <div class="sc-footer">
          <div class="sc-price">Rs. ${Number(s.price).toLocaleString()} <small>/ ${s.priceUnit||'hour'}</small></div>
          <button class="sc-btn" onclick="openModal('${s.id}',event)">View Space</button>
        </div>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('#lpGrid .space-card').forEach(el => {
    el.addEventListener('mouseenter', () => cur.classList.add('expand'));
    el.addEventListener('mouseleave', () => cur.classList.remove('expand'));
  });
}

// ── SPACE MODAL ──
function openModal(id, e) {
  if (e) e.stopPropagation();
  const s = allSpaces.find(x => x.id === id); if (!s) return;
  currentImages = s.images && s.images.length ? s.images : [];
  const mainEl = document.getElementById('mImgMain');
  const thumbsEl = document.getElementById('mThumbs');
  if (currentImages.length) {
    mainEl.style.backgroundImage = `url('${currentImages[0]}')`;
    mainEl.style.backgroundSize = 'cover'; mainEl.style.backgroundPosition = 'center'; mainEl.innerHTML = '';
    thumbsEl.innerHTML = currentImages.map((u,i) => `<div class="m-thumb${i===0?' active':''}" style="background-image:url('${u}')" onclick="switchImg(${i},this)"></div>`).join('');
    thumbsEl.style.display = currentImages.length > 1 ? 'flex' : 'none';
  } else { mainEl.style.background='var(--warm)'; mainEl.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:4rem;color:var(--muted)">🏠</div>'; thumbsEl.style.display='none'; }
  document.getElementById('mType').textContent = s.type||'';
  document.getElementById('mTitle').textContent = s.name||'';
  document.getElementById('mLoc').textContent = '📍 '+(s.city||'')+(s.location?', '+s.location:'');
  document.getElementById('mPrice').innerHTML = `Rs. ${Number(s.price).toLocaleString()} <small>/ ${s.priceUnit||'hour'}</small>`;
  const badge = document.getElementById('mBadge');
  if (s.badge) { badge.textContent=s.badge; badge.style.display='inline-block'; } else badge.style.display='none';
  document.getElementById('mDesc').textContent = s.description||'';
  const init = (s.contactName||'SP').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('mPerson').innerHTML = `<div class="m-av">${init}</div><div><div class="m-pname">${s.contactName||'Space Owner'}</div><div class="m-prole">Contact Person</div></div>`;
  const links = [];
  if (s.contactMobile) links.push(`<a class="c-link" href="tel:${s.contactMobile}"><div class="c-icon">📱</div><div><div class="c-label">Call</div><div class="c-val">${s.contactMobile}</div></div></a>`);
  if (s.contactWhatsapp) links.push(`<a class="c-link" href="${s.contactWhatsapp}" target="_blank"><div class="c-icon">💬</div><div><div class="c-label">WhatsApp</div><div class="c-val">Chat Now</div></div></a>`);
  if (s.contactEmail) links.push(`<a class="c-link" href="mailto:${s.contactEmail}"><div class="c-icon">✉️</div><div><div class="c-label">Email</div><div class="c-val">${s.contactEmail}</div></div></a>`);
  document.getElementById('mContacts').innerHTML = links.join('');
  document.getElementById('spaceModal').classList.add('open');
}

function switchImg(i, el) {
  document.getElementById('mImgMain').style.backgroundImage = `url('${currentImages[i]}')`;
  document.querySelectorAll('.m-thumb').forEach(t => t.classList.remove('active')); el.classList.add('active');
}
function closeModal() { document.getElementById('spaceModal').classList.remove('open'); }
function closeModalBg(e) { if (e.target === document.getElementById('spaceModal')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key==='Escape') { closeModal(); closeCity(); } });

// Check if opened with ?city= param
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const city = params.get('city');
  if (city) setTimeout(() => openCity(decodeURIComponent(city)), 300);
});

init();
</script>
</body>
</html>
